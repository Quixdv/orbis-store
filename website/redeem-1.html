<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Orbis · Redeem</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg-base:       #04070f;
  --bg-surface:    #080d1a;
  --bg-glass:      rgba(10, 20, 45, 0.6);
  --bg-glass2:     rgba(15, 30, 60, 0.4);
  --border:        rgba(50, 110, 200, 0.25);
  --border-bright: rgba(80, 160, 255, 0.45);
  --accent:        #3b82f6;
  --accent-hi:     #60a5fa;
  --accent-glow:   rgba(59, 130, 246, 0.3);
  --text-primary:  #f0f4ff;
  --text-secondary:#7ea3cc;
  --text-muted:    #3a5578;
  --success:       #34d399;
  --error:         #f87171;
  --font-display:  'Syne', sans-serif;
  --font-mono:     'JetBrains Mono', monospace;
  --radius:        14px;
  --radius-sm:     8px;
  --ad-h:          72px;
}

html { height: 100%; }

body {
  font-family: var(--font-display);
  background: var(--bg-base);
  color: var(--text-primary);
  min-height: 100vh;
  padding-bottom: calc(var(--ad-h) + 20px);
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 70% 50% at 80% -10%, rgba(37,99,235,0.15) 0%, transparent 60%),
    radial-gradient(ellipse 60% 40% at 10% 100%, rgba(59,130,246,0.1) 0%, transparent 60%);
  pointer-events: none;
  z-index: 0;
}

body::after {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(50,110,200,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(50,110,200,0.04) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
  z-index: 0;
}

/* ── NAV ── */
nav {
  position: relative;
  z-index: 10;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 24px;
  height: 64px;
  background: rgba(4, 7, 15, 0.85);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  animation: slideDown 0.5s ease;
}

@keyframes slideDown {
  from { transform: translateY(-100%); opacity: 0; }
  to   { transform: translateY(0);     opacity: 1; }
}

.nav-brand {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 18px;
  font-weight: 800;
  letter-spacing: -0.5px;
  color: var(--text-primary);
  text-decoration: none;
}

.nav-brand-icon {
  width: 32px;
  height: 32px;
  background: linear-gradient(135deg, var(--accent) 0%, #1d4ed8 100%);
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  box-shadow: 0 0 16px var(--accent-glow);
}

.nav-tabs {
  display: flex;
  gap: 4px;
  background: var(--bg-glass2);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 4px;
}

.tab {
  padding: 7px 18px;
  border-radius: 9px;
  cursor: pointer;
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0.2px;
  color: var(--text-secondary);
  transition: all 0.2s ease;
  user-select: none;
  white-space: nowrap;
}

.tab:hover { color: var(--text-primary); background: rgba(59,130,246,0.1); }
.tab.active {
  color: var(--text-primary);
  background: var(--accent);
  box-shadow: 0 0 14px var(--accent-glow);
}

.nav-links {
  display: flex;
  gap: 8px;
}

.nav-icon-btn {
  width: 36px;
  height: 36px;
  border-radius: 9px;
  background: var(--bg-glass2);
  border: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  text-decoration: none;
  color: var(--text-secondary);
  transition: all 0.2s;
  cursor: pointer;
}

.nav-icon-btn:hover {
  color: var(--text-primary);
  border-color: var(--border-bright);
  background: rgba(59,130,246,0.15);
  box-shadow: 0 0 12px var(--accent-glow);
}

.nav-icon-btn img { width: 16px; height: 16px; opacity: 0.8; }
.nav-icon-btn:hover img { opacity: 1; }

/* ── MAIN ── */
main {
  position: relative;
  z-index: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 60px 16px 40px;
  animation: fadeUp 0.6s ease 0.1s both;
}

@keyframes fadeUp {
  from { transform: translateY(24px); opacity: 0; }
  to   { transform: translateY(0);    opacity: 1; }
}

.hero-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 5px 14px;
  background: rgba(52,211,153,0.08);
  border: 1px solid rgba(52,211,153,0.25);
  border-radius: 999px;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--success);
  margin-bottom: 20px;
}

.hero-badge::before {
  content: '';
  width: 6px; height: 6px;
  background: var(--success);
  border-radius: 50%;
  box-shadow: 0 0 6px var(--success);
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50%       { opacity: 0.5; transform: scale(0.8); }
}

.hero-title {
  font-size: clamp(28px, 5vw, 42px);
  font-weight: 800;
  letter-spacing: -1.5px;
  text-align: center;
  line-height: 1.1;
  margin-bottom: 10px;
  background: linear-gradient(135deg, #ffffff 0%, #93c5fd 60%, #3b82f6 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.hero-sub {
  font-size: 14px;
  color: var(--text-secondary);
  text-align: center;
  margin-bottom: 40px;
  max-width: 340px;
  line-height: 1.6;
}

/* ── CARD ── */
.card {
  width: 100%;
  max-width: 460px;
  background: var(--bg-glass);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  border: 1px solid var(--border-bright);
  border-radius: 20px;
  padding: 32px;
  box-shadow:
    0 0 0 1px rgba(59,130,246,0.05),
    0 20px 60px rgba(0,0,30,0.5),
    0 0 80px rgba(37,99,235,0.08) inset;
  position: relative;
  overflow: hidden;
}

.card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(96,165,250,0.6), transparent);
}

.card-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.card-label::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

/* CODE INPUT */
.code-input-wrap {
  position: relative;
  margin-bottom: 14px;
}

.code-input-label {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.8px;
  text-transform: uppercase;
  color: var(--text-secondary);
  margin-bottom: 7px;
  display: block;
}

#code {
  width: 100%;
  padding: 18px 16px;
  border-radius: var(--radius-sm);
  font-size: 26px;
  font-family: var(--font-mono);
  font-weight: 700;
  letter-spacing: 8px;
  text-align: center;
  text-transform: uppercase;
  background: rgba(4, 7, 15, 0.7);
  border: 1px solid var(--border);
  color: var(--text-primary);
  outline: none;
  transition: all 0.2s ease;
}

#code:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(59,130,246,0.15), 0 0 30px rgba(59,130,246,0.08);
  background: rgba(8,13,30,0.8);
}

#code::placeholder {
  font-family: var(--font-mono);
  font-size: 16px;
  font-weight: 400;
  letter-spacing: 4px;
  color: var(--text-muted);
  text-transform: none;
}

/* Hint pills */
.code-hints {
  display: flex;
  justify-content: center;
  gap: 6px;
  margin-bottom: 16px;
  flex-wrap: wrap;
}

.hint-pill {
  font-size: 10px;
  font-family: var(--font-mono);
  color: var(--text-muted);
  background: rgba(59,130,246,0.05);
  border: 1px solid var(--border);
  padding: 3px 9px;
  border-radius: 4px;
  letter-spacing: 0.5px;
}

/* ── BUTTON ── */
.btn-primary {
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: var(--radius-sm);
  font-size: 14px;
  font-family: var(--font-display);
  font-weight: 700;
  letter-spacing: 0.5px;
  color: #fff;
  cursor: pointer;
  position: relative;
  overflow: hidden;
  transition: all 0.2s ease;
  background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
  box-shadow: 0 4px 20px rgba(37,99,235,0.35), 0 0 0 1px rgba(59,130,246,0.3);
}

.btn-primary::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, transparent 50%);
  opacity: 0;
  transition: opacity 0.2s;
}

.btn-primary:hover:not(:disabled) {
  transform: translateY(-1px);
  box-shadow: 0 8px 28px rgba(37,99,235,0.5), 0 0 0 1px rgba(96,165,250,0.5);
}

.btn-primary:hover::before { opacity: 1; }
.btn-primary:active:not(:disabled) { transform: translateY(0); }

.btn-primary:disabled {
  opacity: 0.45;
  cursor: default;
  transform: none;
}

.btn-primary.loading::after {
  content: '';
  display: inline-block;
  width: 14px;
  height: 14px;
  border: 2px solid rgba(255,255,255,0.3);
  border-top-color: #fff;
  border-radius: 50%;
  animation: spin 0.6s linear infinite;
  margin-left: 8px;
  vertical-align: middle;
}

@keyframes spin { to { transform: rotate(360deg); } }

/* ── RESULT ── */
#result {
  margin-top: 18px;
  font-size: 13px;
  min-height: 20px;
}

/* APP CARD */
.app-card {
  background: rgba(4, 7, 15, 0.6);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 16px;
  margin-bottom: 12px;
  animation: popIn 0.3s cubic-bezier(0.34,1.56,0.64,1);
}

@keyframes popIn {
  from { transform: scale(0.95); opacity: 0; }
  to   { transform: scale(1);    opacity: 1; }
}

.app-header {
  display: flex;
  align-items: center;
  gap: 14px;
  margin-bottom: 12px;
}

.app-icon {
  width: 52px;
  height: 52px;
  border-radius: 12px;
  object-fit: cover;
  background: var(--bg-surface);
  border: 1px solid var(--border);
  flex-shrink: 0;
}

.app-name { font-size: 16px; font-weight: 700; color: var(--text-primary); }
.app-version {
  font-size: 11px;
  font-family: var(--font-mono);
  color: var(--accent-hi);
  margin-top: 3px;
  background: rgba(59,130,246,0.1);
  border: 1px solid rgba(59,130,246,0.2);
  padding: 2px 7px;
  border-radius: 4px;
  display: inline-block;
}

.app-desc {
  font-size: 12px;
  color: var(--text-secondary);
  line-height: 1.6;
  white-space: pre-line;
  margin-top: 4px;
}

.app-pkg {
  font-size: 10px;
  font-family: var(--font-mono);
  color: var(--text-muted);
  margin-top: 10px;
  word-break: break-all;
  padding: 8px 10px;
  background: rgba(4,7,15,0.7);
  border-radius: 5px;
  border: 1px solid var(--border);
}

.status-success {
  display: flex;
  align-items: center;
  gap: 7px;
  color: var(--success);
  font-size: 12px;
  font-weight: 600;
  padding: 8px 12px;
  background: rgba(52,211,153,0.08);
  border: 1px solid rgba(52,211,153,0.2);
  border-radius: 6px;
}

.status-error {
  display: flex;
  align-items: center;
  gap: 7px;
  color: var(--error);
  font-size: 13px;
  font-weight: 500;
  padding: 8px 12px;
  background: rgba(248,113,113,0.08);
  border: 1px solid rgba(248,113,113,0.2);
  border-radius: 6px;
}

.status-info {
  display: flex;
  align-items: center;
  gap: 7px;
  color: var(--text-secondary);
  font-size: 13px;
  animation: blink 1.4s ease-in-out infinite;
}

@keyframes blink {
  0%, 100% { opacity: 1; }
  50%       { opacity: 0.5; }
}

/* ── AD BANNER ── */
:root { --ad-banner-height: 72px; }

.ad-banner {
  position: fixed;
  left: 0; right: 0; bottom: 0;
  height: var(--ad-banner-height);
  background: rgba(4,7,15,0.92);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 100;
}

.ad-banner__inner {
  width: min(980px, calc(100% - 24px));
  height: calc(var(--ad-banner-height) - 16px);
  display: flex;
  align-items: center;
  justify-content: center;
}

.ad-slot {
  width: 100%;
  height: 100%;
  border: 1px dashed rgba(59,130,246,0.25);
  border-radius: 10px;
  color: var(--text-muted);
  font-size: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-mono);
  letter-spacing: 0.5px;
}

@media (max-width: 520px) {
  nav { padding: 0 14px; }
  .nav-brand span { display: none; }
  .tab { padding: 7px 12px; font-size: 12px; }
  main { padding: 40px 12px 30px; }
  .card { padding: 22px 18px; }
  #code { font-size: 20px; letter-spacing: 5px; }
  :root { --ad-banner-height: 58px; }
}
</style>
</head>
<body>

<!-- NAV -->
<nav>
  <a class="nav-brand" href="index.html">
    <div class="nav-brand-icon">⬡</div>
    <span>Orbis</span>
  </a>

  <div class="nav-tabs">
    <div class="tab" onclick="location.href='index.html'">Generator</div>
    <div class="tab active">Redeem</div>
    <div class="tab" onclick="window.open('https://github.com/jsifta52-a11y/orbis-store','_blank')">GitHub</div>
    <div class="tab">Info</div>
  </div>

  <div class="nav-links">
    <a class="nav-icon-btn" href="https://twitter.com" target="_blank" aria-label="X / Twitter">
      <img src="https://cdn.simpleicons.org/x/ffffff" alt="X">
    </a>
    <a class="nav-icon-btn" href="https://discord.com" target="_blank" aria-label="Discord">
      <img src="https://cdn.simpleicons.org/discord/ffffff" alt="Discord">
    </a>
    <a class="nav-icon-btn" href="https://github.com/jsifta52-a11y/orbis-store" target="_blank" aria-label="GitHub">
      <img src="https://cdn.simpleicons.org/github/ffffff" alt="GitHub">
    </a>
  </div>
</nav>

<!-- MAIN -->
<main>
  <div class="hero-badge">PS4 · Code Redeem</div>
  <h1 class="hero-title">Redeem Code</h1>
  <p class="hero-sub">Enter your 8-character code to look up and install a PS4 package.</p>

  <div class="card">
    <div class="card-label">Enter Code</div>

    <div class="code-input-wrap">
      <label class="code-input-label" for="code">Redeem Code</label>
      <input id="code"
             placeholder="XXXXXXXX"
             maxlength="8"
             autocomplete="off"
             spellcheck="false"
             aria-label="8-character alphanumeric redeem code"
             oninput="this.value=this.value.toUpperCase().replace(/[^A-Z0-9]/g,'')">
    </div>

    <div class="code-hints">
      <span class="hint-pill">8 characters</span>
      <span class="hint-pill">A–Z and 0–9</span>
      <span class="hint-pill">case-insensitive</span>
    </div>

    <button class="btn-primary" id="redeemBtn" onclick="redeem()">Redeem Code</button>

    <div id="result"></div>
  </div>
</main>

<!-- AD BANNER -->
<div class="ad-banner" role="complementary" aria-label="Advertisement">
  <div class="ad-banner__inner">
    <div id="redeem-monetag-ad-slot" class="ad-slot">Ad space (Monetag)</div>
    <!--
    <script src="https://...monetag..."></script>
    <script>// Monetag init code...</script>
    -->
  </div>
</div>

<script>
const API = "https://orbis-api.jsifta52.workers.dev";

function setResult(html) {
  document.getElementById("result").innerHTML = html;
}

function setBtn(text, disabled = false, loading = false) {
  const b = document.getElementById("redeemBtn");
  b.textContent = text;
  b.disabled = disabled;
  b.classList.toggle("loading", loading);
}

async function redeem() {
  const code = document.getElementById("code").value.trim().toUpperCase();
  if (!code || code.length < 4) {
    setResult('<div class="status-error">⚠ Please enter a valid redeem code.</div>');
    return;
  }

  setBtn("Looking up…", true, true);
  setResult('<div class="status-info">⟳ Looking up code…</div>');

  try {
    const res = await fetch(`${API}/api/redeem/${encodeURIComponent(code)}`);
    const data = await res.json();

    if (data.valid) {
      showApp(data);
    } else {
      setResult(`<div class="status-error">⚠ ${escHtml(data.error || "Invalid code")}</div>`);
    }
  } catch (e) {
    setResult('<div class="status-error">⚠ Network error – check your connection.</div>');
  } finally {
    setBtn("Redeem Code");
  }
}

function showApp(data) {
  const iconHtml = data.icon_url
    ? `<img class="app-icon" src="${escHtml(data.icon_url)}" alt="" onerror="this.style.display='none'">`
    : `<div class="app-icon"></div>`;

  setResult(`
    <div class="app-card">
      <div class="app-header">
        ${iconHtml}
        <div>
          <div class="app-name">${escHtml(data.name || "Unknown")}</div>
          <span class="app-version">v${escHtml(data.version || "—")}</span>
        </div>
      </div>
      ${data.description ? `<div class="app-desc">${escHtml(data.description)}</div>` : ""}
      ${data.pkg_url ? `<div class="app-pkg">PKG: ${escHtml(data.pkg_url)}</div>` : ""}
    </div>
    <div class="status-success">✓ Code is valid — enter it in the Orbis Store app on your PS4 to install.</div>
  `);
}

function escHtml(s) {
  return String(s)
    .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;").replace(/'/g,"&#39;");
}

// Enter key support
document.getElementById("code").addEventListener("keydown", e => {
  if (e.key === "Enter") redeem();
});
</script>

</body>
</html>
